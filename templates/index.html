<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Master</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-container">
    <div class="left-panel">
      <div class="difficulty-bar">
        <span>Difficulty:</span>
        <button class="level active">Easy</button>
        <button class="level">Medium</button>
        <button class="level">Hard</button>
        <button class="level">Expert</button>
        <button class="level">Master</button>
        <button class="level">Extreme</button>
      </div>

      <div class="sudoku-board" id="sudoku-board"></div>
    </div>

    <div class="right-panel">
      <div class="top-stats">
        <div class="score-box">
          <h2 id="score">0</h2>
        </div>
        <div class="mistakes-box">
          <p>Mistakes</p>
          <h3 id="mistakes">0/3</h3>
        </div>
        <div class="timer-box">
          <p>Time</p>
          <h3 id="timer">00:00</h3>
        </div>
      </div>

      <div class="tool-row">
        <button class="tool-btn" id="erase-btn">⌫</button>
        <button class="tool-btn" id="solve-btn">✎</button>
        <button class="tool-btn" id="hint-btn">💡</button>
      </div>

      <div class="number-pad" id="number-pad">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
      </div>

      <button class="new-game-btn" id="new-game-btn">New Game</button>
    </div>
  </div>

  <script>
    const initialBoard = [
      [0,6,0,3,0,0,4,1,0],
      [1,8,5,0,2,0,7,0,3],
      [0,0,0,5,0,0,9,2,8],
      [0,9,6,8,0,2,0,5,7],
      [2,1,0,0,4,0,3,0,0],
      [0,5,0,0,0,6,0,8,4],
      [5,0,0,0,0,4,6,0,0],
      [0,0,0,6,1,3,5,4,0],
      [0,0,9,0,0,7,0,0,0]
    ];
  </script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
